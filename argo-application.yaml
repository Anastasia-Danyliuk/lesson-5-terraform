# Reference manifest. Terraform installs the equivalent resource through
# modules/argo_cd/charts so no manual kubectl apply is required.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: django-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Anastasia-Danyliuk/lesson-5-terraform.git
    targetRevision: final-project
    path: charts/django-app
  destination:
    server: https://kubernetes.default.svc
    namespace: django-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
