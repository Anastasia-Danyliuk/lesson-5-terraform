replicaCount: 2

image:
  repository: "228266398439.dkr.ecr.us-east-1.amazonaws.com/lesson-5-ecr"
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

config:
  DEBUG: "False"
  ALLOWED_HOSTS: "*"

secretConfig:
  DJANGO_SECRET_KEY: "replace-me-before-production"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

resources:
  limits: { cpu: 300m, memory: 256Mi }
  requests: { cpu: 100m, memory: 128Mi }

livenessProbe:
  httpGet: { path: /health/, port: 8000 }
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet: { path: /health/, port: 8000 }
  initialDelaySeconds: 5
  periodSeconds: 5
